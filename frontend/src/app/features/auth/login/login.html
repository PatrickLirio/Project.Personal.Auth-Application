<div
  class="relative z-10 w-[450px] rounded-[20px] border-2 border-cyan-400/30 bg-[#0a0e27]/80 p-10 shadow-[0_0_50px_rgba(0,255,255,0.2)] backdrop-blur-md"
>
  <!-- corner decorations -->
  <div
    class="absolute top-[10px] left-[10px] h-[20px] w-[20px] border-l-2 border-t-2 border-cyan-400"
  ></div>
  <div
    class="absolute top-[10px] right-[10px] h-[20px] w-[20px] border-r-2 border-t-2 border-cyan-400"
  ></div>
  <div
    class="absolute bottom-[10px] left-[10px] h-[20px] w-[20px] border-l-2 border-b-2 border-cyan-400"
  ></div>
  <div
    class="absolute bottom-[10px] right-[10px] h-[20px] w-[20px] border-r-2 border-b-2 border-cyan-400"
  ></div>

  <!-- header -->
  <div class="header">
    <div class="scan-line"></div>
    <h1>ACCESS</h1>
    <p class="status-text">System Ready</p>
  </div>

  <!-- form -->
  <form class="space-y-6" (submit)="onSubmit($event)">
    <!-- email -->
    <div>
      <label class="mb-2 block text-[11px] font-bold uppercase tracking-[2px] text-cyan-400">
        User Identification
      </label>

      <div class="relative flex items-center">
        <fa-icon [icon]="faUser" class="absolute left-4 text-cyan-400"></fa-icon>

        <input
          type="email"
          placeholder="Enter email address"
          required
          class="w-full rounded-lg border border-cyan-400/30 bg-cyan-400/5 py-3 pl-12 pr-4 text-cyan-400 placeholder-cyan-400/40 outline-none focus:border-cyan-400 focus:bg-cyan-400/10 focus:shadow-[0_0_20px_rgba(0,255,255,0.3)]"
        />
      </div>
    </div>

    <!-- password -->
    <div>
      <label class="mb-2 block text-[11px] font-bold uppercase tracking-[2px] text-cyan-400">
        Security Code
      </label>

      <div class="relative flex items-center">
        <fa-icon [icon]="faLock" class="absolute left-4 text-cyan-400"></fa-icon>

        <input
          #passwordField
          [type]="isPasswordVisible ? 'text' : 'password'"
          placeholder="Enter password"
          required
          class="w-full rounded-lg border border-cyan-400/30 bg-cyan-400/5 py-3 pl-12 pr-10 text-cyan-400 placeholder-cyan-400/40 outline-none focus:border-cyan-400 focus:bg-cyan-400/10 focus:shadow-[0_0_20px_rgba(0,255,255,0.3)]"
        />

        <fa-icon
          [icon]="isPasswordVisible ? faEyeSlash : faEye"
          (click)="togglePassword()"
          class="absolute right-4 cursor-pointer text-cyan-400 transition hover:scale-110 hover:text-emerald-400"
        ></fa-icon>
      </div>
    </div>

    <!-- remember -->
    <div class="flex items-center justify-between text-[12px]">
      <label class="flex cursor-pointer items-center gap-2 text-cyan-400/70">
        <input type="checkbox" class="h-4 w-4 cursor-pointer accent-cyan-400" />
        Remember Session
      </label>

      <a
        class="text-cyan-400/70 transition hover:text-cyan-400 hover:drop-shadow-[0_0_10px_#00ffff] hover:underline cursor-pointer"
      >
        Recovery Mode?
      </a>
    </div>

    <!-- button -->
    <button
      class="w-full rounded-lg border-2 border-cyan-400 bg-gradient-to-br from-cyan-400/20 to-emerald-400/20 py-4 text-sm font-bold uppercase tracking-[3px] text-cyan-400 transition hover:-translate-y-[2px] hover:bg-gradient-to-br hover:from-cyan-400/30 hover:to-emerald-400/30 hover:shadow-[0_0_30px_rgba(0,255,255,0.5)]"
    >
      Initialize Login
    </button>
  </form>

  <!-- divider -->
  <div class="my-8 flex items-center">
    <div
      class="h-[1px] flex-1 bg-gradient-to-r from-transparent via-cyan-400/30 to-transparent"
    ></div>
    <span class="px-4 text-[11px] tracking-[2px] text-cyan-400/50">ALTERNATIVE ACCESS</span>
    <div
      class="h-[1px] flex-1 bg-gradient-to-r from-transparent via-cyan-400/30 to-transparent"
    ></div>
  </div>

  <!-- social -->
  <div class="mb-6 grid grid-cols-3 gap-4">
    <button
      class="flex items-center justify-center rounded-lg border border-cyan-400/30 bg-cyan-400/5 p-3 text-cyan-400 text-xl transition hover:-translate-y-1 hover:border-cyan-400 hover:bg-cyan-400/15 hover:shadow-[0_0_20px_rgba(0,255,255,0.3)]"
    >
      <fa-icon [icon]="faGoogle"></fa-icon>
    </button>

    <button
      class="flex items-center justify-center rounded-lg border border-cyan-400/30 bg-cyan-400/5 p-3 text-cyan-400 text-xl transition hover:-translate-y-1 hover:border-cyan-400 hover:bg-cyan-400/15 hover:shadow-[0_0_20px_rgba(0,255,255,0.3)]"
    >
      <fa-icon [icon]="faGithub"></fa-icon>
    </button>

    <button
      class="flex items-center justify-center rounded-lg border border-cyan-400/30 bg-cyan-400/5 p-3 text-cyan-400 text-xl transition hover:-translate-y-1 hover:border-cyan-400 hover:bg-cyan-400/15 hover:shadow-[0_0_20px_rgba(0,255,255,0.3)]"
    >
      <fa-icon [icon]="faDiscord"></fa-icon>
    </button>
  </div>

  <div class="text-center">
    <a
      class="text-[13px] text-emerald-400 transition hover:text-cyan-400 hover:drop-shadow-[0_0_10px_#00ffff] cursor-pointer"
    >
      CREATE NEW ACCOUNT →
    </a>
  </div>
</div>
